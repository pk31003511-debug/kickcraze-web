<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { width: 300px; padding: 20px; border: 1px solid #ccc; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: blue; color: white; border: none; }
    </style>
</head>
<body>

<div class="box">
    <div id="loginSection">
        <h3>Login</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="adminSection" style="display:none;">
        <h3>Add Shoe</h3>
        <input type="text" id="title" placeholder="Title">
        <input type="number" id="price" placeholder="Price">
        <input type="text" id="img" placeholder="Image URL">
        <button onclick="addShoe()">Submit</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabase = supabase.createClient('https://qryvixlfyzdaawjiryic.supabase.co', 'sb_publishable_foN7QwGkf4XsnRee0ZGNWg_LJNkna2G');

    async function login() {
        const { error } = await supabase.auth.signInWithPassword({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        });
        if (error) alert(error.message);
        else {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            alert("Login Successful!");
        }
    }

    async function addShoe() {
        const { error } = await supabase.from('products').insert({
            title: document.getElementById('title').value,
            price: document.getElementById('price').value,
            image_url: document.getElementById('img').value
        });
        if (error) alert(error.message);
        else alert("Shoe Added!");
    }
</script>
</body>
</html>
